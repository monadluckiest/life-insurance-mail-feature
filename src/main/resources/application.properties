# Server Configuration
server.port=8080
spring.application.name=Life Insurance Application

# H2 Database Configuration (File-based for persistence across restarts)
spring.datasource.url=jdbc:h2:file:./data/lifeinsurance
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Stripe Configuration
stripe.api.key=sk_test_YOUR_STRIPE_KEY
stripe.public.key=pk_test_YOUR_STRIPE_PUBLIC_KEY

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.insurance=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Default for local development
python.base.url=http://localhost:8000
# To override in production or Docker, set the environment variable PYTHON_BASE_URL
# Example: PYTHON_BASE_URL=http://python-agent:8000

# Email Configuration - Localhost Dummy SMTP (e.g. Mailpit/Papercut)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

notification.email.from=no-reply@localhost.com
notification.email.to=test@example.com
notification.email.enabled=true
